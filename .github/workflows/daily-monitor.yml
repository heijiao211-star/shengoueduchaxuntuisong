name: 纳指100申购额度日报

on:
  workflow_dispatch:
  schedule:
    # 01:10 UTC = 09:10 China Standard Time, Monday through Friday.
    - cron: "10 1 * * 1-5"

permissions:
  contents: write

concurrency:
  group: nasdaq100-daily-monitor
  cancel-in-progress: false

jobs:
  monitor-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build daily report
        run: python scripts/monitor.py

      - name: Send PushPlus notification
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python scripts/send_pushplus.py

      - name: Save report history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.csv reports/latest.json reports/latest.md reports/latest.html
          git diff --cached --quiet || git commit -m "chore: update daily quota report"
          git push
